<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitWoW</title>
<style>
    :root { color-scheme: light dark; }
    body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        line-height: 1.6;
        color: #242424;
        max-width: 720px;
        margin: 0 auto;
        padding: 60px 20px;
        background: #fff;
        text-align: center;
    }
    h1 { font-size: 32px; font-weight: 700; margin: 0 0 12px; }
    p.tagline { color: #666; font-size: 16px; margin: 0 0 40px; }
    section { margin-bottom: 40px; }
    h2 {
        font-size: 14px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1.2px;
        color: #888;
        margin: 0 0 14px;
    }
    nav { display: flex; flex-direction: column; gap: 10px; max-width: 320px; margin: 0 auto; }
    a {
        color: #0a7;
        text-decoration: none;
        font-size: 16px;
        padding: 12px 18px;
        border: 1px solid #e8e8e8;
        border-radius: 12px;
        display: block;
        transition: background 0.15s;
    }
    a:hover { background: #f5f5f5; }
    a.disabled {
        color: #aaa;
        cursor: not-allowed;
        pointer-events: none;
    }
    footer { margin-top: 60px; color: #999; font-size: 13px; }
    @media (prefers-color-scheme: dark) {
        body { background: #000; color: #f5f5f5; }
        p.tagline { color: #aaa; }
        h2 { color: #777; }
        a { border-color: #333; color: #4ec9b0; }
        a:hover { background: #1a1a1a; }
        a.disabled { color: #555; }
        footer { color: #666; }
    }
</style>
</head>
